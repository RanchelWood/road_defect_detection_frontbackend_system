version: "3.9"

services:
  backend:
    image: road-defect-backend:dev
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    restart: unless-stopped

  frontend:
    image: road-defect-frontend:dev
    build:
      context: ../frontend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
  media_data: