openapi: 3.1.0
info:
  title: Road Damage Defect System API
  version: 0.2.0
  description: Async external-engine integration contract for MVP image inference.
servers:
  - url: http://localhost:8000
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Backend is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeHealth'
  /auth/register:
    post:
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeAuth'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'
  /auth/login:
    post:
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeAuth'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeAuth'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /auth/logout:
    post:
      summary: Logout current session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeMessage'
  /models:
    get:
      summary: List supported model presets across engines
      responses:
        '200':
          description: Models list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeModels'
  /inference/jobs:
    post:
      summary: Create async image inference job
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
                - model_id
              properties:
                image:
                  type: string
                  format: binary
                model_id:
                  type: string
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeJobAccepted'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '422':
          $ref: '#/components/responses/ErrorResponse'
  /inference/jobs/{job_id}:
    get:
      summary: Get inference job status and result
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeJobStatus'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /inference/jobs/{job_id}/cancel:
    post:
      summary: Cancel an inference job for the owning user
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancellation accepted or completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeJobCancel'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /inference/jobs/{job_id}/image/{kind}:
    get:
      summary: Stream an inference job image for the owning user
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [original, annotated]
      responses:
        '200':
          description: Binary image stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /history:
    get:
      summary: List current user's inference job history
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: model_id
          in: query
          schema:
            type: string
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [time, id, name]
            default: time
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: History list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeHistory'
        '401':
          $ref: '#/components/responses/ErrorResponse'
    delete:
      summary: Clear all history records for current user
      responses:
        '200':
          description: History cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeHistoryCleared'
        '401':
          $ref: '#/components/responses/ErrorResponse'
  /history/{job_id}:
    delete:
      summary: Delete one history record owned by current user
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: History record deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeHistoryDeleted'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
  /ws/inference:
    get:
      summary: Reserved Phase 2 WebSocket contract endpoint
      description: Placeholder path for post-MVP streaming behavior.
      responses:
        '426':
          description: Upgrade Required for WebSocket use
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ErrorResponse:
      description: Standard API error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    Meta:
      type: object
      required:
        - request_id
        - timestamp
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    ErrorEnvelope:
      type: object
      required:
        - success
        - error
        - meta
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          oneOf:
            - $ref: '#/components/schemas/ErrorBody'
            - type: "null"
        meta:
          $ref: '#/components/schemas/Meta'
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    UserPublic:
      type: object
      required:
        - id
        - email
        - role
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, user]
    AuthPayload:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
        - user
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600
        user:
          $ref: '#/components/schemas/UserPublic'
    ModelMetadata:
      type: object
      required:
        - model_id
        - engine_id
        - status
        - performance_notes
      properties:
        model_id:
          type: string
        engine_id:
          type: string
        status:
          type: string
          enum: [active, deprecated, disabled]
        performance_notes:
          type: string
    Detection:
      type: object
      required:
        - label
        - confidence
        - bbox
      properties:
        label:
          type: string
        confidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
        bbox:
          type: object
          required:
            - x1
            - y1
            - x2
            - y2
          properties:
            x1:
              type: number
            y1:
              type: number
            x2:
              type: number
            y2:
              type: number
    MediaRef:
      type: object
      required:
        - id
        - kind
        - path
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [original, annotated]
        path:
          type: string
    JobAcceptedPayload:
      type: object
      required:
        - job_id
        - status
        - model_id
        - engine_id
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued]
        model_id:
          type: string
        engine_id:
          type: string
    InferenceResultPayload:
      type: object
      required:
        - model_id
        - engine_id
        - detections
        - image_refs
      properties:
        model_id:
          type: string
        engine_id:
          type: string
        detections:
          type: array
          items:
            $ref: '#/components/schemas/Detection'
        image_refs:
          type: array
          items:
            $ref: '#/components/schemas/MediaRef'
        duration_ms:
          type: integer
    JobStatusPayload:
      type: object
      required:
        - job_id
        - status
        - model_id
        - engine_id
        - created_at
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        model_id:
          type: string
        engine_id:
          type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type:
            - string
            - "null"
          format: date-time
        finished_at:
          type:
            - string
            - "null"
          format: date-time
        result:
          oneOf:
            - $ref: '#/components/schemas/InferenceResultPayload'
            - type: "null"
        error:
          oneOf:
            - $ref: '#/components/schemas/ErrorBody'
            - type: "null"
    HistoryItem:
      type: object
      required:
        - job_id
        - model_id
        - engine_id
        - original_filename
        - status
        - timestamp
      properties:
        job_id:
          type: string
        model_id:
          type: string
        engine_id:
          type: string
        original_filename:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        timestamp:
          type: string
          format: date-time
        defect_count:
          type: integer
        max_confidence:
          type: number
    SuccessEnvelopeHealth:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - status
          properties:
            status:
              type: string
              example: ok
        meta:
          $ref: '#/components/schemas/Meta'
    SuccessEnvelopeAuth:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/AuthPayload'
        meta:
          $ref: '#/components/schemas/Meta'
    SuccessEnvelopeModels:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - items
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ModelMetadata'
        meta:
          $ref: '#/components/schemas/Meta'
    SuccessEnvelopeJobAccepted:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/JobAcceptedPayload'
        meta:
          $ref: '#/components/schemas/Meta'
    SuccessEnvelopeJobStatus:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/JobStatusPayload'
        meta:
          $ref: '#/components/schemas/Meta'
    SuccessEnvelopeHistory:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - items
            - page
            - page_size
            - total
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/HistoryItem'
            page:
              type: integer
            page_size:
              type: integer
            total:
              type: integer
        meta:
          $ref: '#/components/schemas/Meta'
    JobCancelPayload:
      type: object
      required:
        - job_id
        - status
        - message
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [queued, running, succeeded, failed, cancelled]
        message:
          type: string
    SuccessEnvelopeJobCancel:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/JobCancelPayload'
        meta:
          $ref: '#/components/schemas/Meta'
    HistoryDeletedPayload:
      type: object
      required:
        - message
        - job_id
      properties:
        message:
          type: string
        job_id:
          type: string
    HistoryClearedPayload:
      type: object
      required:
        - message
        - deleted_count
      properties:
        message:
          type: string
        deleted_count:
          type: integer
    SuccessEnvelopeHistoryDeleted:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/HistoryDeletedPayload'
        meta:
          $ref: '#/components/schemas/Meta'
    SuccessEnvelopeHistoryCleared:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: '#/components/schemas/HistoryClearedPayload'
        meta:
          $ref: '#/components/schemas/Meta'
    SuccessEnvelopeMessage:
      type: object
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required:
            - message
          properties:
            message:
              type: string
        meta:
          $ref: '#/components/schemas/Meta'
